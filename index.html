<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Checker</title>
  <style>
    body { 
      font-family: sans-serif; 
      max-width: 480px; 
      margin: 80px auto; 
      text-align: center; 
      background: #0f1629; 
      color: #e0e8ff; 
      padding: 20px; 
    }
    #login-form { 
      background: rgba(20, 28, 55, 0.9); 
      padding: 32px; 
      border-radius: 12px; 
      box-shadow: 0 10px 32px rgba(0,0,0,0.6); 
    }
    input, button { 
      display: block; 
      width: 100%; 
      margin: 16px 0; 
      padding: 14px; 
      border-radius: 8px; 
      border: 1px solid #3a4a70; 
      background: #141c35; 
      color: white; 
      font-size: 1.05rem; 
      box-sizing: border-box; 
    }
    button { 
      background: linear-gradient(90deg, #5a7aff, #7a9fff); 
      border: none; 
      cursor: pointer; 
      font-weight: bold; 
    }
    button:hover { background: linear-gradient(90deg, #6a8aff, #8aafff); }
    #status { 
      min-height: 1.5em; 
      font-weight: bold; 
      margin-top: 12px; 
    }
    .success { color: #22ffbb; }
    .error   { color: #ff5577; }

    /* Console */
    #console-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100%;
      background: rgba(8,10,25,0.96);
      border-left: 1px solid #2a3450;
      color: #d0d8ff;
      transition: right 0.35s ease;
      z-index: 9999;
      font-family: Consolas, monospace;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }
    #console-panel.open { right: 0; }
    #console-header {
      padding: 14px 18px;
      background: #121a38;
      border-bottom: 1px solid #3a4a66;
      font-weight: bold;
      color: #90b0ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #console-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      background: #2c3b66;
      color: #c0d8ff;
      border: 1px solid #4a5a88;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 1rem;
    }
    #console-content {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      background: #060a1c;
    }
    .log-line { margin: 6px 0; line-height: 1.4; word-break: break-all; }
    .success { color: #00ffaa; background: rgba(0,255,170,0.08); padding: 3px 8px; border-radius: 4px; }
    .error   { color: #ff5a7a; background: rgba(255,90,122,0.09); padding: 3px 8px; border-radius: 4px; }
    .timestamp { color: #7a8abb; margin-right: 10px; }
    .highlight { color: #aaccff; font-weight: bold; }
  </style>
</head>
<body>

  <button id="console-toggle">CONSOLE</button>

  <div id="login-form">
    <h1>Sign In</h1>
    <form id="loginForm">
      <input type="email" name="email" placeholder="16674@monroeps.net" required autocomplete="off">
      <input type="password" name="password" placeholder="Password" required autocomplete="off">
      <button type="submit">Log In</button>
    </form>
    <div id="status"></div>
  </div>

  <!-- Console panel -->
  <div id="console-panel">
    <div id="console-header">
      <span>Login Log</span>
      <span style="cursor:pointer; font-size:1.4rem;" onclick="toggleConsole()">×</span>
    </div>
    <div id="console-content"></div>
  </div>

  <script>
    const consoleContent = document.getElementById('console-content');
    const consolePanel   = document.getElementById('console-panel');
    const toggleBtn      = document.getElementById('console-toggle');
    const statusEl       = document.getElementById('status');

    function toggleConsole() {
      consolePanel.classList.toggle('open');
    }
    toggleBtn.addEventListener('click', toggleConsole);

    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString([], { hour12: false });
      const line = document.createElement('div');
      line.className = 'log-line';
      if (type === 'success') line.classList.add('success');
      if (type === 'error')   line.classList.add('error');
      line.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
      consoleContent.appendChild(line);
      consoleContent.scrollTop = consoleContent.scrollHeight;
    }

    const form = document.getElementById('loginForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const email = (data.get('email') || '').trim().toLowerCase();

      log(`Attempt: <span class="highlight">${email}</span>`);

      statusEl.textContent = '';
      statusEl.className = '';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          body: data
        });
        const text = await res.text();

        if (res.ok) {
          log(`→ SUCCESS: Password matched for ${email}`, 'success');
          statusEl.textContent = 'Login successful (check console)';
          statusEl.className = 'success';
          form.reset();  // Clear the fields after success
        } else {
          log(`→ FAILED: ${text || 'Incorrect credentials'}`, 'error');
          statusEl.textContent = text || 'Incorrect email or password';
          statusEl.className = 'error';
        }
      } catch (err) {
        log(`→ ERROR: Network issue - ${err.message}`, 'error');
        statusEl.textContent = 'Connection error';
        statusEl.className = 'error';
      }
    });

    // Welcome logs
    log("Console ready.", 'info');
    log("Test accounts:", 'info');
    log("• 16674@monroeps.net → Math123!", 'info');
    log("• 14244@monroeps.net → Password1!", 'info');
  </script>
</body>
</html>
