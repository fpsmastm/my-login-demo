<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>body{font-family:sans-serif; max-width:400px; margin:80px auto; text-align:center;}</style>
</head>
<body>
  <h1>Sign In</h1>
  <form action="/login" method="POST">
    <input type="email" name="email" placeholder="your@email.com" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Log In</button>
  </form>

  <p id="msg" style="color:red; min-height:1.5em;"></p>

  <script>
    const form = document.querySelector('form');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch('/login', { method: 'POST', body: data });
      const text = await res.text();

      if (res.ok) {
        window.location.href = '/dashboard.html';
      } else {
        msg.textContent = text || 'Login failed';
      }
    });
  </script>
</body>
</html>
